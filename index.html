<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domineering — mathclass.today</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --crimson:#A01C31;--navy:#182B49;--navy-light:#243756;
  --cream:#FAF8F5;--border:#e2ddd7;--text:#1a1a1a;--muted:#6b6560;
  --hcolor:#1d4ed8;--hbg:#eff6ff;--hborder:#93c5fd;
  --vcolor:#b45309;--vbg:#fffbeb;--vborder:#fcd34d;
  --wcolor:#166534;--wbg:#f0fdf4;--lcolor:#991b1b;--lbg:#fef2f2;
  --gone:#e5e7eb;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--navy);padding:0 2rem;height:52px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-family:'Crimson Pro',serif;font-size:18px;color:#fff;text-decoration:none}
.nav-brand span{color:#c9a96e}
.nav-back{font-size:13px;color:rgba(255,255,255,0.6);text-decoration:none;transition:color .15s}
.nav-back:hover{color:#fff}
.hero{background:var(--navy);color:#fff;padding:2rem 2rem 1.75rem;text-align:center;border-bottom:3px solid var(--crimson)}
.hero-eyebrow{font-size:12px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#c9a96e;margin-bottom:.5rem}
.hero h1{font-family:'Crimson Pro',serif;font-size:clamp(2rem,4vw,2.8rem);font-weight:600;line-height:1.1}
main{flex:1;max-width:1100px;margin:0 auto;padding:1.5rem;width:100%}

/* SETUP BAR */
.setup-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.setup-bar label{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:.05em;text-transform:uppercase}
.setup-bar select,.setup-bar button{font-family:'DM Sans',sans-serif;font-size:14px}
.setup-bar select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--cream);color:var(--text);cursor:pointer}
.btn-start{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-start:hover{background:var(--navy-light)}
.btn-secondary{padding:8px 14px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:7px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-secondary:hover{background:var(--cream)}

/* GAME AREA */
.top-area{display:flex;gap:1.25rem;align-items:start;margin-bottom:1.25rem;flex-wrap:wrap}
.left-panel{display:flex;flex-direction:column;gap:1rem;width:220px;flex-shrink:0}

/* STATUS */
.status-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;min-width:220px}
.status-label{font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
#status-text{font-size:14px;line-height:1.55;min-height:40px;max-width:190px}
#status-text.h-turn{color:var(--hcolor)}
#status-text.v-turn{color:var(--vcolor)}
#status-text.h-wins{color:var(--wcolor);font-weight:500}
#status-text.v-wins{color:var(--vcolor);font-weight:500}

/* LEGEND */
.legend{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.legend-row:last-child{margin-bottom:0}
.swatch{width:20px;height:20px;border-radius:4px;flex-shrink:0;border:1.5px solid}

/* BOARD */
.board-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
#board-div{display:inline-grid;border:2px solid #9ca3af;border-radius:6px;overflow:hidden;gap:0}
.cell{width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;cursor:pointer;transition:background .1s;border:1px solid #e5e7eb;user-select:none}
.cell:hover{filter:brightness(.93)}
.cell-empty{background:#fff;color:transparent}
.cell-h{background:var(--hbg);color:var(--hcolor);border-color:var(--hborder)}
.cell-v{background:var(--vbg);color:var(--vcolor);border-color:var(--vborder)}
.cell-preview{background:#dbeafe;border-color:var(--hcolor)}
.cell-preview-v{background:#fef3c7;border-color:var(--vcolor)}

/* TREE PANEL */
.tree-panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1rem;overflow:auto}
.tree-panel.disabled{opacity:.45;pointer-events:none}
.tree-panel.disabled .tree-header{cursor:default!important}
#tree-body{}
#tree-body.collapsed{display:none}
.tree-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.tree-header h3{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
#tree-svg{display:block}
.tree-node{cursor:pointer}
.tree-node circle{stroke-width:2;transition:r .1s}
.tree-node.current circle{stroke-width:3;r:14}
.tree-node text{font-size:11px;font-weight:500;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.tree-edge{stroke:#d1d5db;stroke-width:1.5;fill:none}
.tree-edge.winning-path{stroke:var(--wcolor);stroke-width:2.5}
.node-unplayed circle{fill:#f9fafb;stroke:#9ca3af}
.node-unplayed text{fill:#6b7280}
.node-w circle{fill:var(--wbg);stroke:var(--wcolor)}
.node-w text{fill:var(--wcolor)}
.node-l circle{fill:var(--lbg);stroke:var(--lcolor)}
.node-l text{fill:var(--lcolor)}
.node-h circle{fill:var(--hbg);stroke:var(--hcolor)}
.node-h text{fill:var(--hcolor)}
.node-v circle{fill:var(--vbg);stroke:var(--vcolor)}
.node-v text{fill:var(--vcolor)}
.node-current circle{stroke-width:3.5!important}

/* TOOLTIP */
#tooltip{position:fixed;background:var(--navy);color:#fff;font-size:12px;padding:6px 10px;border-radius:6px;pointer-events:none;display:none;z-index:100;max-width:180px;line-height:1.4}
#tooltip canvas{display:block;margin-top:6px;border-radius:3px}

footer{text-align:center;padding:1.25rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
footer a{color:var(--navy);text-decoration:none}
footer a:hover{text-decoration:underline}

@media(max-width:700px){
  .top-area{flex-direction:column}
  .left-panel{flex-direction:row;flex-wrap:wrap}
}
</style>
</head>
<body>
<nav>
  <a class="nav-brand" href="https://mathclass.today">mathclass<span>.today</span></a>
  <a class="nav-back" href="https://mathclass.today">← back</a>
</nav>
<div class="hero">
  <div class="hero-eyebrow">Problem Solving · Game Theory</div>
  <h1>Domineering</h1>
</div>
<main>
  <div class="setup-bar">
    <div>
      <label>Board</label><br>
      <select id="board-select">
        <option value="2x2">2×2</option>
        <option value="2x3" selected>2×3</option>
        <option value="2x4">2×4</option>
        <option value="3x3">3×3</option>
        <option value="4x4">4×4 (play)</option>
        <option value="4x5">4×5 (play)</option>
        <option value="4x6">4×6 (play)</option>
      </select>
    </div>
    <div>
      <label>First move</label><br>
      <select id="first-select">
        <option value="H">Horizontal goes first</option>
        <option value="V">Vertical goes first</option>
      </select>
    </div>
    <button class="btn-start" onclick="startGame()">New game</button>
  </div>

  <div class="top-area">
    <div class="left-panel">
      <div class="status-box">
        <div class="status-label">Status</div>
        <div id="status-text"></div>
      </div>
      <div class="legend">
        <div class="status-label">Legend</div>
        <div class="legend-row"><div class="swatch" style="background:var(--hbg);border-color:var(--hcolor)"></div>Horizontal (blue)</div>
        <div class="legend-row"><div class="swatch" style="background:var(--vbg);border-color:var(--vcolor)"></div>Vertical (amber)</div>
        <div class="legend-row" id="legend-w" style="display:none"><div class="swatch" style="background:var(--wbg);border-color:var(--wcolor)"></div>W — winning position</div>
        <div class="legend-row" id="legend-l" style="display:none"><div class="swatch" style="background:var(--lbg);border-color:var(--lcolor)"></div>L — losing position</div>
      </div>
    </div>
    <div class="board-wrap">
      <div id="board-div"></div>
    </div>
  </div>

  <div class="tree-panel" id="tree-panel">
    <div class="tree-header" onclick="toggleTree()" style="cursor:pointer;user-select:none">
      <h3>Game tree <span id="tree-toggle-icon" style="font-size:14px;margin-left:4px">▸</span></h3>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span id="tree-note" style="font-size:12px;color:var(--muted)"></span>
        <button id="btn-reveal" onclick="event.stopPropagation();revealTree()" style="display:none;padding:3px 10px;font-size:11px;font-family:'DM Sans',sans-serif;background:#fff;border:1px solid var(--border);border-radius:5px;cursor:pointer;color:var(--muted)">show W/L</button>
      </div>
    </div>
    <div id="tree-body" class="collapsed">
      <svg id="tree-svg"></svg>
    </div>
  </div>
</main>
<footer><a href="https://mathclass.today">mathclass.today</a> · Mike Harrington · Middlesex School</footer>
<div id="tooltip"><span id="tt-text"></span><canvas id="tt-canvas" width="90" height="60"></canvas></div>

function syncRevealButton() {

}

function toggleTree() {
  const body = document.getElementById('tree-body');
  const icon = document.getElementById('tree-toggle-icon');
  const collapsed = body.classList.toggle('collapsed');
  icon.textContent = collapsed ? '▸' : '▾';
  if(!collapsed) renderTree(); // recalculate scale now that container is visible

}

      const cell = document.createElement('div');
      cell.className = 'cell cell-empty';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.addEventListener('mouseenter', ()=>onCellHover(r,c));
      cell.addEventListener('mouseleave', ()=>onCellLeave());
      cell.addEventListener('click', ()=>onCellClick(r,c));
      container.appendChild(cell);
    }
  }
}

function renderBoard() {
  // Updates classes/labels on existing DOM nodes — never rebuilds
  const container = document.getElementById('board-div');
  const cells = container.querySelectorAll('.cell');
  let i = 0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell = cells[i++];
      const occ = grid[r][c];
      if(occ === 'H') {
        const isLeft = c===0 || grid[r][c-1]!=='H';
        cell.className = 'cell cell-h';
        cell.textContent = isLeft ? 'H' : '';
      } else if(occ === 'V') {
        const isTop = r===0 || grid[r-1]?.[c]!=='V';
        cell.className = 'cell cell-v';
        cell.textContent = isTop ? 'V' : '';
      } else {
        const isPreview = previewCells.some(([pr,pc])=>pr===r&&pc===c);
        cell.className = 'cell ' + (isPreview
          ? (currentIsH ? 'cell-preview' : 'cell-preview-v')
          : 'cell-empty');
        cell.textContent = '';
      }
    }
  }
}




function getDominoFrom(r, c) {
  // Returns the canonical domino [topLeft, bottomRight] if placing
  // current player's piece touching cell (r,c) is legal, else []
  if(grid[r][c] !== null) return [];
  if(currentIsH) {
    // prefer extending right, then left
    if(c+1 < cols && grid[r][c+1] === null) return [[r,c],[r,c+1]];
    if(c-1 >= 0 && grid[r][c-1] === null) return [[r,c-1],[r,c]];
    return [];
  } else {
    if(r+1 < rows && grid[r+1][c] === null) return [[r,c],[r+1,c]];
    if(r-1 >= 0 && grid[r-1][c] === null) return [[r-1,c],[r,c]];
    return [];
  }
}

function onCellHover(r, c) {
  if(gameOver) return;
  previewCells = getDominoFrom(r, c);
  renderBoard();
}
function onCellLeave() {
  previewCells = [];
  renderBoard();
}

function onCellClick(r, c) {
  if(gameOver) return;
  // Always recompute fresh -- mouseleave may have cleared previewCells before click fires
  const cells = getDominoFrom(r, c);
  if(cells.length === 0) return;
  // Place domino
  for(const [pr,pc] of cells) grid[pr][pc] = currentIsH ? 'H' : 'V';
  previewCells = [];

  // Advance tree node
  if(treeData) {
    const placed = cells.map(([pr,pc])=>`${pr},${pc}`).sort().join('|');
    const child = treeData.edges
      .filter(e=>e.from===currentNodeId)
      .find(e=>{
        const childNode = treeData.nodes.find(n=>n.id===e.to);
        if(!childNode) return false;
        const newOcc = childNode.occ.map(([r,c])=>`${r},${c}`).sort().join('|');
        const boardOcc = [];
        for(let rr=0;rr<rows;rr++) for(let cc=0;cc<cols;cc++) if(grid[rr][cc]) boardOcc.push(`${rr},${cc}`);
        boardOcc.sort();
        return newOcc === boardOcc.join('|');
      });
    if(child) currentNodeId = child.to;
    renderTree();
  }

  currentIsH = !currentIsH;
  // Check if next player has moves
  if(!hasMoves()) {
    gameOver = true;
    const winner = currentIsH ? 'Vertical' : 'Horizontal';
    const cls = currentIsH ? 'v-wins' : 'h-wins';
    setStatus(`${winner} wins — the other player has no legal move.`, cls);
    // reveal button shows when user opens the tree
    renderBoard();
    return;
  }
  setStatus(`${currentIsH?'Horizontal':'Vertical'} to move.`, currentIsH?'h-turn':'v-turn');
  renderBoard();
}

function hasMoves() {
  if(currentIsH) {
    for(let r=0;r<rows;r++) for(let c=0;c<cols-1;c++)
      if(grid[r][c]===null && grid[r][c+1]===null) return true;
  } else {
    for(let r=0;r<rows-1;r++) for(let c=0;c<cols;c++)
      if(grid[r][c]===null && grid[r+1][c]===null) return true;
  }
  return false;
}

// ── TREE ──────────────────────────────────────────────────
const NODE_R = 13;
const H_GAP = 36;
const V_GAP = 50;

function renderTree() {
  const svg = document.getElementById('tree-svg');
  svg.innerHTML = '';
  if(!treeData) { svg.setAttribute('width',200); svg.setAttribute('height',40); return; }

  // Build layout: BFS level positions
  const nodes = treeData.nodes;
  const edges = treeData.edges;
  const childMap = {};
  edges.forEach(e=>{ if(!childMap[e.from]) childMap[e.from]=[]; childMap[e.from].push(e.to); });

  // Compute x positions via post-order
  const pos = {};
  let leafX = [NODE_R+2];

  function layout(id, depth) {
    const children = childMap[id] || [];
    if(children.length===0){
      pos[id] = {x: leafX[0], y: depth*V_GAP+NODE_R+2};
      leafX[0] += H_GAP;
      return;
    }
    children.forEach(cid=>layout(cid, depth+1));
    const xs = children.map(cid=>pos[cid].x);
    pos[id] = {x: (Math.min(...xs)+Math.max(...xs))/2, y: depth*V_GAP+NODE_R+2};
  }
  layout(0, 0);

  const maxX = Math.max(...Object.values(pos).map(p=>p.x)) + NODE_R + 4;
  const maxY = Math.max(...Object.values(pos).map(p=>p.y)) + NODE_R + 4;
  svg.setAttribute('width', maxX);
  svg.setAttribute('height', maxY);

  // Scale to fit container width
  const container = document.getElementById('tree-body');
  const availW = container.clientWidth || 600;
  const scale = Math.min(1, Math.max(0.35, availW / maxX));
  svg.style.transform = `scale(${scale})`;
  svg.style.transformOrigin = 'top left';
  svg.style.display = 'block';
  // shrink wrapper height to match scaled height so no gap below
  svg.parentElement.style.height = Math.ceil(maxY * scale) + 'px';
  svg.parentElement.style.overflow = 'hidden';

  // Find path from root to current node
  const onPath = new Set();
  function findPath(id, target, path) {
    if(id===target){ path.forEach(p=>onPath.add(p)); return true; }
    for(const cid of (childMap[id]||[])){
      if(findPath(cid, target, [...path, `${id}-${cid}`])) return true;
    }
    return false;
  }
  findPath(0, currentNodeId, []);

  // Draw edges first
  edges.forEach(e=>{
    const from = pos[e.from], to = pos[e.to];
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',from.x); line.setAttribute('y1',from.y);
    line.setAttribute('x2',to.x); line.setAttribute('y2',to.y);
    const onWP = onPath.has(`${e.from}-${e.to}`);
    line.setAttribute('class','tree-edge'+(onWP?' winning-path':''));
    svg.appendChild(line);
  });

  // Draw nodes
  nodes.forEach(node=>{
    const p = pos[node.id];
    if(!p) return;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','tree-node');
    g.setAttribute('transform',`translate(${p.x},${p.y})`);

    const isCurrent = node.id === currentNodeId;
    const isPlayed = isOnPathToCurrentOrBefore(node.id);

    let cls = 'node-unplayed';
    if(isCurrent) cls = node.is_h ? 'node-h' : 'node-v';
    else if(isPlayed) {
      if(revealed) cls = node.val===1 ? 'node-w' : 'node-l';
      else cls = node.is_h ? 'node-h' : 'node-v';
    } else if(revealed) {
      cls = node.val===1 ? 'node-w' : 'node-l';
    }
    if(isCurrent) cls += ' node-current';

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r', NODE_R);
    g.setAttribute('class', `tree-node ${cls}`);
    g.appendChild(circle);

    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    let label = '';
    if(revealed) label = node.val===1?'W':'L';
    else if(node.id===currentNodeId) label = node.is_h?'H':'V';
    else if(isPlayed) label = node.is_h?'H':'V';
    text.textContent = label;
    g.appendChild(text);

    // Hover tooltip
    g.addEventListener('mouseenter', (ev)=>showTooltip(ev, node));
    g.addEventListener('mousemove', (ev)=>moveTooltip(ev));
    g.addEventListener('mouseleave', hideTooltip);

    // Transparent hit rect for reliable click capture
    const hit = document.createElementNS('http://www.w3.org/2000/svg','rect');
    hit.setAttribute('x', -NODE_R); hit.setAttribute('y', -NODE_R);
    hit.setAttribute('width', NODE_R*2); hit.setAttribute('height', NODE_R*2);
    hit.setAttribute('fill', 'transparent');
    hit.style.cursor = 'pointer';
    hit.addEventListener('click', ()=>jumpToNode(node));
    g.appendChild(hit);

    svg.appendChild(g);
  });
}

function jumpToNode(node) {
  if(!treeData) return;
  // Only allow jumping to already-played positions (ancestors of current or current itself)
  if(!isOnPathToCurrentOrBefore(node.id)) return;
  // Restore board state from node's occ
  grid = Array.from({length:rows}, ()=>new Array(cols).fill(null));
  node.occ.forEach(([r,c])=>{
    // Determine H or V by checking neighbors
    const isH = node.occ.some(([or,oc])=>or===r && oc===c+1);
    const isV = node.occ.some(([or,oc])=>or===r+1 && oc===c);
    grid[r][c] = isH ? 'H' : (isV ? 'V' : null);
  });
  // Fix: cells that are part of a pair get the right label
  // Re-derive from occ pairs in the full history
  rebuildGridFromOcc(node.occ);
  currentNodeId = node.id;
  currentIsH = node.is_h;
  gameOver = false;
  setStatus(`${currentIsH?'Horizontal':'Vertical'} to move.`, currentIsH?'h-turn':'v-turn');
  renderBoard();
  renderTree();
}

function rebuildGridFromOcc(occ) {
  grid = Array.from({length:rows}, ()=>new Array(cols).fill(null));
  const occSet = new Set(occ.map(([r,c])=>`${r},${c}`));
  // Mark H dominoes: cell (r,c) and (r,c+1) both occupied
  for(const [r,c] of occ) {
    if(occSet.has(`${r},${c+1}`) && grid[r][c]===null && grid[r][c+1]===null) {
      grid[r][c] = 'H'; grid[r][c+1] = 'H';
    }
  }
  // Mark V dominoes: cell (r,c) and (r+1,c) both occupied
  for(const [r,c] of occ) {
    if(occSet.has(`${r+1},${c}`) && grid[r][c]===null && grid[r+1][c]===null) {
      grid[r][c] = 'V'; grid[r+1][c] = 'V';
    }
  }
}

function isOnPathToCurrentOrBefore(id) {
  // BFS from root, check if id is an ancestor of currentNodeId
  function ancestors(target) {
    const parentMap = {};
    treeData.edges.forEach(e=>{ parentMap[e.to]=e.from; });
    const anc = new Set();
    let cur = target;
    while(cur !== undefined && cur !== null) {
      anc.add(cur);
      cur = parentMap[cur];
    }
    return anc;
  }
  return ancestors(currentNodeId).has(id);
}

function revealTree() {
  revealed = true;
  document.getElementById('legend-w').style.display='flex';
  document.getElementById('legend-l').style.display='flex';
  const btn = document.getElementById('btn-reveal'); if(btn) btn.style.display='none';
  renderTree();
}

// ── TOOLTIP ───────────────────────────────────────────────
function showTooltip(ev, node) {
  const tt = document.getElementById('tooltip');
  const canvas = document.getElementById('tt-canvas');
  const occ = node.occ;
  const cellSize = Math.min(Math.floor(88/cols), Math.floor(58/rows));
  canvas.width = cols*cellSize+2;
  canvas.height = rows*cellSize+2;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const isOcc = occ.some(([or,oc])=>or===r&&oc===c);
      ctx.fillStyle = isOcc ? '#bfdbfe' : '#f9fafb';
      ctx.strokeStyle = '#9ca3af';
      ctx.lineWidth = 0.5;
      ctx.fillRect(c*cellSize+1, r*cellSize+1, cellSize-1, cellSize-1);
      ctx.strokeRect(c*cellSize+1, r*cellSize+1, cellSize-1, cellSize-1);
    }
  }
  let txt = `${node.is_h?'H':'V'} to move`;
  if(revealed) txt += ` · ${node.val===1?'W':'L'}`;
  document.getElementById('tt-text').textContent = txt;
  tt.style.display='block';
  moveTooltip(ev);
}
function moveTooltip(ev) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (ev.clientX+14)+'px';
  tt.style.top = (ev.clientY-10)+'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.display='none';
}

function setStatus(msg, cls) {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = cls||'';
}

startGame();
</script>
